<div class="container mt-4">

  <div class="row">

<!-- Sol filtreleme paneli -->
    <div class="col-md-3">

      <div class="card shadow-sm border-0 rounded-4 p-3 stick-top" style="top:20px;">
        <h5 class="mb-3">Filtreler</h5>

        <!-- Marka -->
        <div class="mb-3">      
          <input type="text" 
              class="form-control" 
              placeholder="Marka ara"
              [(ngModel)]="filters.brand"
              (input)="loadFilteredVehicles()">
        </div>

        <!-- Model -->
        <div class="mb-3">     
          <input type="text" 
          class="form-control" 
          placeholder="Model ara" 
          [(ngModel)]="filters.model"
          (input)="loadFilteredVehicles()">
        </div>

        <!-- KM Aralığı -->
        <div class="mb-3">      
          <div class="col">
            <input type="number" 
            class="form-control"
             placeholder="Max KM"
             [(ngModel)]="filters.maxKm"
            (input)="loadFilteredVehicles()">
          </div>
     
          <div class="col">
            <input type="number" 
            class="form-control" 
            placeholder="Min Km"
             [(ngModel)]="filters.minKm"
            (input)="loadFilteredVehicles()">
          </div>
        
        </div>

      </div>

    </div>


    <!-- SAĞ ARAÇ LİSTESİ -->
    <div class="col-md-9">

      <div class="card my-2" *ngFor="let vehicle of vehicless">
        <div class="row g-0">

          <div class="col-3">
            <div style="height:120px; overflow:hidden;">
              <img [src]="vehicle.imageUrl" style="width:100%; height:100%; object-fit:cover;" class="rounded-start">
            </div>
          </div>

          <div class="col-9">
            <div class="card-body">

              <h5 class="card-title">
                <a [routerLink]="['/vehicles', vehicle.id]">
                  {{ vehicle.brandName || 'Marka Yok' }}
                  {{ vehicle.modelName || '' }}
                  {{vehicle.yil || ''}}
               
                </a>
              </h5>

              <p class="card-text mb-1">
                <strong>Yıl:</strong> {{ vehicle.yil || '-' }} |
                <strong>KM:</strong> {{ vehicle.km | number }} |
                <strong>Yakıt:</strong> {{ vehicle.yakitTuru || '-' }}
              </p>

              <p class="card-text">
                <span class="badge me-2" [ngClass]="vehicle.ilanda ? 'bg-success' : 'bg-secondary'">
                  {{ vehicle.ilanda ? 'İlanda' : 'Pasif' }}
                </span>

                <span class="text-muted">
                  {{ vehicle.status || 'Durum Yok' }}
                </span>
              </p>

            </div>
          </div>

        </div>
      </div>

      <!-- MORE BUTTON -->
      <div *ngIf="hasMore" class="text-center my-3">
        <button class="btn btn-primary" (click)="loadMore()">
          More Vehicles
        </button>
      </div>

    </div>

  </div>
